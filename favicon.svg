<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F6F2E6"/>
      <stop offset="100%" stop-color="#B8942F"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B7F3C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="16" fill="#0A1628"/>

  <!-- W shape - main strokes -->
  <g stroke="url(#goldLine)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <polyline points="38,60 65,152 100,72 135,152 162,60"/>
  </g>

  <!-- Primary nodes (W vertices only) -->
  <g filter="url(#glow)">
    <circle cx="38" cy="60" r="5.5" fill="url(#gold)"/>
    <circle cx="65" cy="152" r="5.5" fill="url(#gold)"/>
    <circle cx="100" cy="72" r="5.5" fill="url(#gold)"/>
    <circle cx="135" cy="152" r="5.5" fill="url(#gold)"/>
    <circle cx="162" cy="60" r="5.5" fill="url(#gold)"/>
  </g>
</svg>
